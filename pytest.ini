[pytest]
# Pytest configuration for AI-SRE Incident Analysis System

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests
pythonpath = src

# Output options
# Note: Coverage options (--cov, --cov-fail-under) are intentionally NOT included
# here because they would apply to ALL test suites globally. Property tests and
# infrastructure tests cannot reach 80% coverage on their own since they only
# exercise a subset of the source code. Coverage is configured per-job in CI
# (see .github/workflows/ci-cd.yml) and can be run locally with:
#   pytest tests/unit/ --cov=src --cov-fail-under=80
addopts =
    --verbose
    --strict-markers
    --tb=short

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions
    property: Property-based tests using Hypothesis
    integration: Integration tests with mocked AWS services
    infrastructure: Terraform and IAM policy validation tests
    slow: Tests that take more than 1 second
    aws: Tests that require AWS credentials (skip in CI)

# Hypothesis settings
hypothesis_profile = dev

[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
