[pytest]
# Pytest configuration for AI-SRE Incident Analysis System

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests
pythonpath = src

# Output options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions
    property: Property-based tests using Hypothesis
    integration: Integration tests with mocked AWS services
    infrastructure: Terraform and IAM policy validation tests
    slow: Tests that take more than 1 second
    aws: Tests that require AWS credentials (skip in CI)

# Hypothesis settings
hypothesis_profile = dev

[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
