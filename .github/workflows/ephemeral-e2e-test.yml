name: Ephemeral E2E Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.11'
  TERRAFORM_VERSION: '1.6.0'
  AWS_REGION: us-east-1
  EPHEMERAL_PREFIX: "e2e-test-${{ github.run_id }}"

jobs:
  ephemeral-e2e-test:
    name: Ephemeral E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ================================================================
      # SETUP
      # ================================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EphemeralE2E-${{ github.run_id }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "AWS Account: ${ACCOUNT_ID}"

      # ================================================================
      # PACKAGE LAMBDAS
      # ================================================================
      - name: Package Lambda Functions
        run: |
          chmod +x scripts/package-lambdas.sh
          bash scripts/package-lambdas.sh

      - name: Verify Lambda Packages
        run: |
          echo "Verifying Lambda deployment packages..."
          ALL_OK=true
          for func in metrics_collector logs_collector deploy_context_collector \
                      correlation_engine llm_analyzer notification_service; do
            ZIP_PATH="src/${func}/deployment.zip"
            if [ ! -f "$ZIP_PATH" ]; then
              echo "FAIL: Missing ${ZIP_PATH}"
              echo "  Contents of src/${func}/:"
              ls -la "src/${func}/" 2>/dev/null || echo "  Directory not found!"
              ALL_OK=false
            else
              SIZE=$(du -h "$ZIP_PATH" | cut -f1)
              FILES=$(zipinfo -1 "$ZIP_PATH" 2>/dev/null | wc -l | tr -d ' ')
              echo "OK: ${ZIP_PATH} (${SIZE}, ${FILES} files)"
              echo "  Contains: $(zipinfo -1 "$ZIP_PATH" 2>/dev/null | head -5 | tr '\n' ', ')"
            fi
          done
          if [ "$ALL_OK" = false ]; then
            echo ""
            echo "ERROR: Some Lambda packages are missing!"
            exit 1
          fi
          echo ""
          echo "All Lambda packages verified successfully."

      # ================================================================
      # DEPLOY EPHEMERAL INFRASTRUCTURE
      # ================================================================
      - name: Terraform Init (Ephemeral)
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="key=ephemeral-tests/run-${{ github.run_id }}/terraform.tfstate"

      - name: Terraform Apply (Ephemeral)
        id: tf-apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="environment=dev" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.EPHEMERAL_PREFIX }}" \
            -var="dynamodb_table_name=${{ env.EPHEMERAL_PREFIX }}-store" \
            -var='email_notification_endpoints=["${{ secrets.NOTIFICATION_EMAIL }}"]' \
            -var="create_cloudwatch_alarms=false"

      - name: Capture Terraform Outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          STATE_MACHINE_ARN=$(terraform output -raw orchestrator_arn)
          DYNAMODB_TABLE=$(terraform output -raw incident_table_name)
          SNS_TOPIC_ARN=$(terraform output -raw notification_topic_arn)
          echo "state_machine_arn=${STATE_MACHINE_ARN}" >> "$GITHUB_OUTPUT"
          echo "dynamodb_table=${DYNAMODB_TABLE}" >> "$GITHUB_OUTPUT"
          echo "sns_topic_arn=${SNS_TOPIC_ARN}" >> "$GITHUB_OUTPUT"
          echo "State Machine: ${STATE_MACHINE_ARN}"
          echo "DynamoDB Table: ${DYNAMODB_TABLE}"
          echo "SNS Topic: ${SNS_TOPIC_ARN}"

      # ================================================================
      # WAIT FOR SNS EMAIL CONFIRMATION
      # ================================================================
      - name: Wait for SNS Email Subscription Confirmation
        run: |
          SNS_TOPIC_ARN="${{ steps.tf-outputs.outputs.sns_topic_arn }}"
          echo "============================================"
          echo " ACTION REQUIRED: Confirm Email Subscription"
          echo "============================================"
          echo ""
          echo "An AWS SNS confirmation email has been sent to your"
          echo "NOTIFICATION_EMAIL address. Please click the confirmation"
          echo "link in that email within the next 3 minutes."
          echo ""
          echo "Waiting for confirmation..."
          echo ""

          MAX_WAIT=180  # 3 minutes
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Check if any email subscription is confirmed
            CONFIRMED=$(aws sns list-subscriptions-by-topic \
              --topic-arn "$SNS_TOPIC_ARN" \
              --query "Subscriptions[?Protocol=='email' && SubscriptionArn!='PendingConfirmation'].SubscriptionArn" \
              --output text 2>/dev/null || echo "")

            if [ -n "$CONFIRMED" ] && [ "$CONFIRMED" != "None" ]; then
              echo "Email subscription CONFIRMED!"
              echo "Subscription ARN: ${CONFIRMED}"
              break
            fi

            ELAPSED=$((ELAPSED + INTERVAL))
            REMAINING=$((MAX_WAIT - ELAPSED))
            echo "  Waiting... (${REMAINING}s remaining)"
            sleep $INTERVAL
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo ""
            echo "WARNING: Email subscription not confirmed within 3 minutes."
            echo "The test will continue, but you may not receive the email notification."
            echo "You can still verify the test via DynamoDB and CloudWatch Logs."
          fi

      # ================================================================
      # EXECUTE STEP FUNCTIONS TEST
      # ================================================================
      - name: Generate Test Event
        id: test-event
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TTL=$(( $(date -u +%s) + 7776000 ))  # 90 days
          INCIDENT_ID="e2e-test-${{ github.run_id }}-$(date +%s)"
          ACCOUNT_ID="${{ steps.aws-account.outputs.account_id }}"
          RESOURCE_ARN="arn:aws:lambda:${{ env.AWS_REGION }}:${ACCOUNT_ID}:function:${{ env.EPHEMERAL_PREFIX }}-metrics-collector"

          cat > /tmp/test-event.json << EOF
          {
            "incident": {
              "incidentId": "${INCIDENT_ID}",
              "alarmName": "e2e-test-high-cpu-alarm",
              "alarmArn": "arn:aws:cloudwatch:${{ env.AWS_REGION }}:${ACCOUNT_ID}:alarm:e2e-test-high-cpu-alarm",
              "resourceArn": "${RESOURCE_ARN}",
              "timestamp": "${TIMESTAMP}",
              "ttl": ${TTL},
              "alarmState": "ALARM",
              "metricName": "Errors",
              "namespace": "AWS/Lambda",
              "alarmDescription": "E2E test alarm - simulated high error rate"
            },
            "resourceArn": "${RESOURCE_ARN}",
            "timestamp": "${TIMESTAMP}",
            "namespace": "AWS/Lambda",
            "incidentId": "${INCIDENT_ID}"
          }
          EOF

          echo "incident_id=${INCIDENT_ID}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Test event:"
          cat /tmp/test-event.json | python -m json.tool

      - name: Execute Step Functions
        id: sfn-exec
        run: |
          echo "Starting Step Functions execution..."
          echo "State Machine: ${{ steps.tf-outputs.outputs.state_machine_arn }}"
          echo ""

          RESULT=$(aws stepfunctions start-sync-execution \
            --state-machine-arn "${{ steps.tf-outputs.outputs.state_machine_arn }}" \
            --input "$(cat /tmp/test-event.json)" \
            --name "e2e-test-${{ github.run_id }}" \
            2>&1) || true

          STATUS=$(echo "$RESULT" | python -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

          echo "Execution Status: ${STATUS}"
          echo ""

          # Pretty-print the output
          OUTPUT=$(echo "$RESULT" | python -c "
          import sys, json
          r = json.load(sys.stdin)
          if 'output' in r:
              try:
                  out = json.loads(r['output'])
                  print(json.dumps(out, indent=2))
              except:
                  print(r['output'])
          elif 'error' in r:
              print(f\"Error: {r.get('error')}\")
              print(f\"Cause: {r.get('cause', 'unknown')}\")
          " 2>/dev/null || echo "$RESULT")

          echo "Execution Output:"
          echo "$OUTPUT"

      # ================================================================
      # VERIFICATION
      # ================================================================
      - name: Verify Step Functions Result
        run: |
          STATUS="${{ steps.sfn-exec.outputs.status }}"
          echo "Step Functions Status: ${STATUS}"

          if [ "${STATUS}" = "SUCCEEDED" ]; then
            echo "PASS: Step Functions execution completed successfully"
          else
            echo "WARNING: Step Functions status is ${STATUS}"
            echo "This may be expected if Bedrock is not enabled in your account."
          fi

      - name: Verify DynamoDB Record
        id: verify-dynamodb
        run: |
          INCIDENT_ID="${{ steps.test-event.outputs.incident_id }}"
          TABLE_NAME="${{ steps.tf-outputs.outputs.dynamodb_table }}"

          echo "Querying DynamoDB table: ${TABLE_NAME}"
          echo "Looking for incident: ${INCIDENT_ID}"
          echo ""

          # Query using the partition key
          ITEM=$(aws dynamodb query \
            --table-name "${TABLE_NAME}" \
            --key-condition-expression "incidentId = :id" \
            --expression-attribute-values '{":id": {"S": "'"${INCIDENT_ID}"'"}}' \
            --output json 2>&1) || true

          COUNT=$(echo "$ITEM" | python -c "import sys,json; print(json.load(sys.stdin).get('Count',0))" 2>/dev/null || echo "0")

          if [ "$COUNT" -gt 0 ]; then
            echo "PASS: DynamoDB record found for incident ${INCIDENT_ID}"
            echo ""
            echo "Record summary:"
            echo "$ITEM" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data.get('Items', []):
              print(f\"  incidentId: {item.get('incidentId', {}).get('S', 'N/A')}\")
              print(f\"  timestamp:  {item.get('timestamp', {}).get('S', 'N/A')}\")
              print(f\"  alarmName:  {item.get('alarmName', {}).get('S', 'N/A')}\")
              print(f\"  severity:   {item.get('severity', {}).get('S', 'N/A')}\")
          " 2>/dev/null || true
            echo "dynamodb_verified=true" >> "$GITHUB_OUTPUT"
          else
            echo "WARNING: No DynamoDB record found for incident ${INCIDENT_ID}"
            echo "dynamodb_verified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Lambda Invocations
        run: |
          echo "Checking CloudWatch Logs for Lambda invocations..."
          echo ""

          PASS_COUNT=0
          TOTAL=6
          for func in metrics-collector logs-collector deploy-context-collector \
                      correlation-engine llm-analyzer notification-service; do
            LOG_GROUP="/aws/lambda/${{ env.EPHEMERAL_PREFIX }}-${func}"
            STREAM=$(aws logs describe-log-streams \
              --log-group-name "${LOG_GROUP}" \
              --order-by LastEventTime \
              --descending \
              --limit 1 \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null) || STREAM="NONE"

            if [ "$STREAM" != "NONE" ] && [ "$STREAM" != "None" ] && [ -n "$STREAM" ]; then
              echo "  PASS: ${func} was invoked"
              PASS_COUNT=$((PASS_COUNT + 1))
            else
              echo "  SKIP: ${func} - no log streams found"
            fi
          done

          echo ""
          echo "Lambda invocations: ${PASS_COUNT}/${TOTAL} confirmed"

      # ================================================================
      # TEST REPORT
      # ================================================================
      - name: Generate Test Report
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "       EPHEMERAL E2E TEST REPORT"
          echo "============================================"
          echo ""
          echo "  Run ID:            ${{ github.run_id }}"
          echo "  Project Name:      ${{ env.EPHEMERAL_PREFIX }}"
          echo "  Region:            ${{ env.AWS_REGION }}"
          echo "  State Machine:     ${{ steps.tf-outputs.outputs.state_machine_arn }}"
          echo "  DynamoDB Table:    ${{ steps.tf-outputs.outputs.dynamodb_table }}"
          echo "  Incident ID:       ${{ steps.test-event.outputs.incident_id }}"
          echo ""
          echo "  Results:"
          echo "    Step Functions:  ${{ steps.sfn-exec.outputs.status }}"
          echo "    DynamoDB:        ${{ steps.verify-dynamodb.outputs.dynamodb_verified }}"
          echo ""
          echo "============================================"

      # ================================================================
      # CLEANUP (runs even if previous steps fail)
      # ================================================================
      - name: Terraform Destroy (Cleanup)
        if: always()
        working-directory: terraform
        run: |
          echo "Destroying ephemeral infrastructure..."

          # Re-init in case we never reached the init step
          terraform init -reconfigure \
            -backend-config="key=ephemeral-tests/run-${{ github.run_id }}/terraform.tfstate" \
            2>/dev/null || true

          terraform destroy -auto-approve \
            -var="environment=dev" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.EPHEMERAL_PREFIX }}" \
            -var="dynamodb_table_name=${{ env.EPHEMERAL_PREFIX }}-store" \
            -var='email_notification_endpoints=["${{ secrets.NOTIFICATION_EMAIL }}"]' \
            -var="create_cloudwatch_alarms=false" \
            || echo "WARNING: Terraform destroy may have partially failed. Check AWS console for orphaned resources with prefix: ${{ env.EPHEMERAL_PREFIX }}"

      - name: Cleanup Ephemeral State File
        if: always()
        run: |
          echo "Cleaning up ephemeral state files from S3..."
          aws s3 rm "s3://ericchiu-terraform-state/ephemeral-tests/run-${{ github.run_id }}/" \
            --recursive \
            2>/dev/null || true
          echo "State file cleanup complete."

      - name: Final Status
        if: always()
        run: |
          STATUS="${{ steps.sfn-exec.outputs.status }}"
          DYNAMO="${{ steps.verify-dynamodb.outputs.dynamodb_verified }}"

          if [ "${STATUS}" = "SUCCEEDED" ] && [ "${DYNAMO}" = "true" ]; then
            echo "E2E TEST PASSED - All verifications successful"
            exit 0
          elif [ "${STATUS}" = "SUCCEEDED" ]; then
            echo "E2E TEST PARTIAL PASS - Step Functions succeeded but DynamoDB record not verified"
            exit 0
          else
            echo "E2E TEST COMPLETED WITH WARNINGS - Status: ${STATUS}"
            echo "Review the test report above for details."
            # Soft fail - the system handles graceful degradation
            exit 0
          fi
