name: Ephemeral E2E Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.11'
  TERRAFORM_VERSION: '1.9.8'
  AWS_REGION: us-east-1
  EPHEMERAL_PREFIX: "e2e-test-${{ github.run_id }}"

jobs:
  ephemeral-e2e-test:
    name: Ephemeral E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ================================================================
      # SETUP
      # ================================================================
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EphemeralE2E-${{ github.run_id }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "AWS Account: ${ACCOUNT_ID}"

      # ================================================================
      # PACKAGE LAMBDAS
      # ================================================================
      - name: Package Lambda Functions
        run: |
          set -euo pipefail
          echo "=== Packaging Lambda functions ==="
          echo "Working directory: $(pwd)"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo ""

          FUNCTIONS="metrics_collector logs_collector deploy_context_collector correlation_engine llm_analyzer notification_service"

          for func in $FUNCTIONS; do
            echo "--- Packaging ${func} ---"
            FUNC_DIR="${GITHUB_WORKSPACE}/src/${func}"
            BUILD_DIR="/tmp/lambda-build/${func}"

            # Verify source exists
            if [ ! -f "${FUNC_DIR}/lambda_function.py" ]; then
              echo "ERROR: ${FUNC_DIR}/lambda_function.py not found!"
              ls -la "${FUNC_DIR}/" 2>/dev/null || echo "Directory does not exist!"
              exit 1
            fi

            # Clean and create build directory
            rm -rf "${BUILD_DIR}"
            mkdir -p "${BUILD_DIR}"

            # Copy function code and shared modules
            cp "${FUNC_DIR}/lambda_function.py" "${BUILD_DIR}/"
            cp -r "${GITHUB_WORKSPACE}/src/shared" "${BUILD_DIR}/shared"

            # Install requests for notification_service only
            if [ "${func}" = "notification_service" ]; then
              echo "  Installing requests..."
              pip install requests -t "${BUILD_DIR}" --quiet --no-cache-dir
            fi

            # Clean up bytecode and dist-info
            find "${BUILD_DIR}" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            find "${BUILD_DIR}" -name "*.pyc" -delete 2>/dev/null || true
            find "${BUILD_DIR}" -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true

            # Remove any old zip
            rm -f "${FUNC_DIR}/deployment.zip"

            # Create zip using absolute paths
            (cd "${BUILD_DIR}" && zip -r9 "${FUNC_DIR}/deployment.zip" .)

            # Clean up build directory
            rm -rf "${BUILD_DIR}"

            # Verify the zip was created and is valid
            if [ ! -f "${FUNC_DIR}/deployment.zip" ]; then
              echo "  ERROR: deployment.zip was NOT created at ${FUNC_DIR}!"
              exit 1
            fi

            SIZE=$(stat --format="%s" "${FUNC_DIR}/deployment.zip")
            if [ "${SIZE}" -lt 100 ]; then
              echo "  ERROR: deployment.zip is suspiciously small (${SIZE} bytes)!"
              exit 1
            fi

            echo "  Created: deployment.zip (${SIZE} bytes)"
            echo "  Top-level files:"
            zipinfo -1 "${FUNC_DIR}/deployment.zip" | grep -v '/' || true
            echo "  Shared module files:"
            zipinfo -1 "${FUNC_DIR}/deployment.zip" | grep '^shared/' | head -10 || true
            echo ""
          done

          echo "=== All Lambda packages created ==="

      - name: Verify Packages From Terraform Directory
        working-directory: terraform
        run: |
          set -euo pipefail
          echo "Verifying from terraform working directory ($(pwd))..."
          echo ""

          FUNCTIONS="metrics_collector logs_collector deploy_context_collector correlation_engine llm_analyzer notification_service"

          for func in $FUNCTIONS; do
            ZIP_PATH="../src/${func}/deployment.zip"
            if [ -f "${ZIP_PATH}" ]; then
              SIZE=$(stat --format="%s" "${ZIP_PATH}")
              REAL=$(realpath "${ZIP_PATH}")
              echo "  OK: ${func} -> ${REAL} (${SIZE} bytes)"
            else
              echo "  FAIL: ${ZIP_PATH} NOT FOUND"
              exit 1
            fi
          done
          echo ""
          echo "All packages verified."

      # ================================================================
      # DEPLOY - PHASE 1: Infrastructure (IAM, DynamoDB, EventBridge)
      # ================================================================
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="key=ephemeral-tests/run-${{ github.run_id }}/terraform.tfstate"

      - name: "Deploy Phase 1: IAM & Infrastructure"
        working-directory: terraform
        run: |
          echo "=== Phase 1: Creating IAM roles, DynamoDB, EventBridge, Secrets ==="
          terraform apply -auto-approve \
            -target=module.secrets \
            -target=module.iam \
            -target=module.dynamodb \
            -target=module.eventbridge \
            -var="environment=dev" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.EPHEMERAL_PREFIX }}" \
            -var="dynamodb_table_name=${{ env.EPHEMERAL_PREFIX }}-store" \
            -var='email_notification_endpoints=["${{ secrets.NOTIFICATION_EMAIL }}"]' \
            -var="create_cloudwatch_alarms=false"
          echo "Phase 1 complete."

      - name: Verify IAM Roles Exist
        run: |
          echo "=== Verifying IAM roles are created and assumable ==="
          for role_suffix in metrics-collector logs-collector deploy-context-collector \
                            correlation-engine llm-analyzer notification-service; do
            ROLE_NAME="${{ env.EPHEMERAL_PREFIX }}-${role_suffix}-role"
            ROLE_ARN=$(aws iam get-role --role-name "${ROLE_NAME}" \
              --query 'Role.Arn' --output text 2>&1) || true

            if [[ "${ROLE_ARN}" == arn:aws:iam* ]]; then
              echo "  OK: ${ROLE_NAME} -> ${ROLE_ARN}"
            else
              echo "  FAIL: ${ROLE_NAME} not found!"
              echo "  Error: ${ROLE_ARN}"
              exit 1
            fi
          done
          echo ""
          echo "All IAM roles verified."

      - name: Test Lambda Creation via AWS CLI
        id: cli-test
        run: |
          echo "=== Testing Lambda creation directly via AWS CLI ==="
          echo "This bypasses Terraform to identify the exact AWS error."
          echo ""

          ROLE_ARN=$(aws iam get-role \
            --role-name "${{ env.EPHEMERAL_PREFIX }}-metrics-collector-role" \
            --query 'Role.Arn' --output text)

          ZIP_PATH="${GITHUB_WORKSPACE}/src/metrics_collector/deployment.zip"
          TEST_FUNC_NAME="e2e-cli-test-${{ github.run_id }}"

          echo "Role ARN: ${ROLE_ARN}"
          echo "Zip path: ${ZIP_PATH}"
          echo "Zip size: $(stat --format='%s' "${ZIP_PATH}") bytes"
          echo "Function: ${TEST_FUNC_NAME}"
          echo ""

          # Try creating a Lambda function directly
          RESULT=$(aws lambda create-function \
            --function-name "${TEST_FUNC_NAME}" \
            --runtime python3.11 \
            --architectures arm64 \
            --handler lambda_function.lambda_handler \
            --role "${ROLE_ARN}" \
            --zip-file "fileb://${ZIP_PATH}" \
            --timeout 10 \
            --memory-size 128 \
            2>&1) || true

          echo "AWS CLI Result:"
          echo "${RESULT}"
          echo ""

          if echo "${RESULT}" | grep -q "FunctionArn"; then
            echo "SUCCESS: Lambda created via AWS CLI!"
            echo "cli_test=passed" >> "$GITHUB_OUTPUT"

            # Clean up test function
            aws lambda delete-function --function-name "${TEST_FUNC_NAME}" 2>/dev/null || true
          else
            echo "FAILED: Lambda creation via AWS CLI also failed."
            echo "cli_test=failed" >> "$GITHUB_OUTPUT"
            echo ""
            echo "This means the issue is NOT Terraform-specific."
            echo "The AWS error above shows the exact reason."

            # Check if it's a role assumption issue - wait and retry
            if echo "${RESULT}" | grep -qi "role.*cannot be assumed\|InvalidParameterValueException"; then
              echo ""
              echo "Possible IAM propagation delay. Waiting 15 seconds and retrying..."
              sleep 15

              RESULT2=$(aws lambda create-function \
                --function-name "${TEST_FUNC_NAME}" \
                --runtime python3.11 \
                --architectures arm64 \
                --handler lambda_function.lambda_handler \
                --role "${ROLE_ARN}" \
                --zip-file "fileb://${ZIP_PATH}" \
                --timeout 10 \
                --memory-size 128 \
                2>&1) || true

              echo "Retry Result:"
              echo "${RESULT2}"

              if echo "${RESULT2}" | grep -q "FunctionArn"; then
                echo "SUCCESS on retry! IAM propagation was the issue."
                echo "cli_test=passed_retry" >> "$GITHUB_OUTPUT"
                aws lambda delete-function --function-name "${TEST_FUNC_NAME}" 2>/dev/null || true
              fi
            fi
          fi

      - name: Wait for IAM Propagation
        run: |
          echo "Waiting 15 seconds for IAM role propagation..."
          sleep 15
          echo "Done."

      # ================================================================
      # DEPLOY - PHASE 2: Lambda & Step Functions
      # ================================================================
      - name: "Deploy Phase 2: Lambda & Step Functions"
        id: tf-apply
        working-directory: terraform
        env:
          TF_LOG: WARN
          TF_LOG_PATH: /tmp/terraform-debug.log
        run: |
          echo "=== Phase 2: Creating Lambda functions & Step Functions ==="
          terraform apply -auto-approve \
            -var="environment=dev" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.EPHEMERAL_PREFIX }}" \
            -var="dynamodb_table_name=${{ env.EPHEMERAL_PREFIX }}-store" \
            -var='email_notification_endpoints=["${{ secrets.NOTIFICATION_EMAIL }}"]' \
            -var="create_cloudwatch_alarms=false" \
            2>&1 | tee /tmp/tf-apply.log
          TF_EXIT=${PIPESTATUS[0]}

          if [ $TF_EXIT -ne 0 ]; then
            echo ""
            echo "============================================"
            echo " TERRAFORM APPLY FAILED - DIAGNOSTIC INFO"
            echo "============================================"
            echo ""
            echo "--- Error lines from terraform output ---"
            grep -i "error\|InvalidParameter\|cannot be assumed\|exception" /tmp/tf-apply.log || true
            echo ""
            echo "--- Error lines from TF_LOG ---"
            grep -i "error\|InvalidParameter\|cannot be assumed\|exception\|StatusCode: 4" /tmp/terraform-debug.log 2>/dev/null | tail -30 || true
            echo ""
            echo "--- AWS CLI test result: ${{ steps.cli-test.outputs.cli_test }} ---"
            exit 1
          fi

          echo "Phase 2 complete. All resources deployed."

      - name: Capture Terraform Outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          STATE_MACHINE_ARN=$(terraform output -raw orchestrator_arn)
          DYNAMODB_TABLE=$(terraform output -raw incident_table_name)
          SNS_TOPIC_ARN=$(terraform output -raw notification_topic_arn)
          echo "state_machine_arn=${STATE_MACHINE_ARN}" >> "$GITHUB_OUTPUT"
          echo "dynamodb_table=${DYNAMODB_TABLE}" >> "$GITHUB_OUTPUT"
          echo "sns_topic_arn=${SNS_TOPIC_ARN}" >> "$GITHUB_OUTPUT"
          echo "State Machine: ${STATE_MACHINE_ARN}"
          echo "DynamoDB Table: ${DYNAMODB_TABLE}"
          echo "SNS Topic: ${SNS_TOPIC_ARN}"

      # ================================================================
      # WAIT FOR SNS EMAIL CONFIRMATION
      # ================================================================
      - name: Wait for SNS Email Subscription Confirmation
        run: |
          SNS_TOPIC_ARN="${{ steps.tf-outputs.outputs.sns_topic_arn }}"
          echo "============================================"
          echo " ACTION REQUIRED: Confirm Email Subscription"
          echo "============================================"
          echo ""
          echo "An AWS SNS confirmation email has been sent to your"
          echo "NOTIFICATION_EMAIL address. Please click the confirmation"
          echo "link in that email within the next 3 minutes."
          echo ""
          echo "Waiting for confirmation..."
          echo ""

          MAX_WAIT=180
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            CONFIRMED=$(aws sns list-subscriptions-by-topic \
              --topic-arn "$SNS_TOPIC_ARN" \
              --query "Subscriptions[?Protocol=='email' && SubscriptionArn!='PendingConfirmation'].SubscriptionArn" \
              --output text 2>/dev/null || echo "")

            if [ -n "$CONFIRMED" ] && [ "$CONFIRMED" != "None" ]; then
              echo "Email subscription CONFIRMED!"
              echo "Subscription ARN: ${CONFIRMED}"
              break
            fi

            ELAPSED=$((ELAPSED + INTERVAL))
            REMAINING=$((MAX_WAIT - ELAPSED))
            echo "  Waiting... (${REMAINING}s remaining)"
            sleep $INTERVAL
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo ""
            echo "WARNING: Email not confirmed within 3 minutes."
            echo "Test will continue without email verification."
          fi

      # ================================================================
      # EXECUTE STEP FUNCTIONS TEST
      # ================================================================
      - name: Generate Test Event
        id: test-event
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TTL=$(( $(date -u +%s) + 7776000 ))
          INCIDENT_ID="e2e-test-${{ github.run_id }}-$(date +%s)"
          ACCOUNT_ID="${{ steps.aws-account.outputs.account_id }}"
          RESOURCE_ARN="arn:aws:lambda:${{ env.AWS_REGION }}:${ACCOUNT_ID}:function:${{ env.EPHEMERAL_PREFIX }}-metrics-collector"

          cat > /tmp/test-event.json << EOF
          {
            "incident": {
              "incidentId": "${INCIDENT_ID}",
              "alarmName": "e2e-test-high-cpu-alarm",
              "alarmArn": "arn:aws:cloudwatch:${{ env.AWS_REGION }}:${ACCOUNT_ID}:alarm:e2e-test-high-cpu-alarm",
              "resourceArn": "${RESOURCE_ARN}",
              "timestamp": "${TIMESTAMP}",
              "ttl": ${TTL},
              "alarmState": "ALARM",
              "metricName": "Errors",
              "namespace": "AWS/Lambda",
              "alarmDescription": "E2E test alarm - simulated high error rate"
            },
            "resourceArn": "${RESOURCE_ARN}",
            "timestamp": "${TIMESTAMP}",
            "namespace": "AWS/Lambda",
            "incidentId": "${INCIDENT_ID}"
          }
          EOF

          echo "incident_id=${INCIDENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Test event:"
          cat /tmp/test-event.json | python -m json.tool

      - name: Execute Step Functions
        id: sfn-exec
        run: |
          echo "Starting Step Functions execution..."
          echo "State Machine: ${{ steps.tf-outputs.outputs.state_machine_arn }}"
          echo ""

          RESULT=$(aws stepfunctions start-sync-execution \
            --state-machine-arn "${{ steps.tf-outputs.outputs.state_machine_arn }}" \
            --input "$(cat /tmp/test-event.json)" \
            --name "e2e-test-${{ github.run_id }}" \
            2>&1) || true

          STATUS=$(echo "$RESULT" | python -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "Execution Status: ${STATUS}"
          echo ""

          OUTPUT=$(echo "$RESULT" | python -c "
          import sys, json
          r = json.load(sys.stdin)
          if 'output' in r:
              try:
                  out = json.loads(r['output'])
                  print(json.dumps(out, indent=2))
              except:
                  print(r['output'])
          elif 'error' in r:
              print(f\"Error: {r.get('error')}\")
              print(f\"Cause: {r.get('cause', 'unknown')}\")
          " 2>/dev/null || echo "$RESULT")

          echo "Execution Output:"
          echo "$OUTPUT"

      # ================================================================
      # VERIFICATION
      # ================================================================
      - name: Verify Step Functions Result
        run: |
          STATUS="${{ steps.sfn-exec.outputs.status }}"
          echo "Step Functions Status: ${STATUS}"
          if [ "${STATUS}" = "SUCCEEDED" ]; then
            echo "PASS: Step Functions execution completed successfully"
          else
            echo "WARNING: Step Functions status is ${STATUS}"
            echo "This may be expected if Bedrock is not enabled."
          fi

      - name: Verify DynamoDB Record
        id: verify-dynamodb
        run: |
          INCIDENT_ID="${{ steps.test-event.outputs.incident_id }}"
          TABLE_NAME="${{ steps.tf-outputs.outputs.dynamodb_table }}"
          echo "Querying DynamoDB table: ${TABLE_NAME}"
          echo "Looking for incident: ${INCIDENT_ID}"
          echo ""

          ITEM=$(aws dynamodb query \
            --table-name "${TABLE_NAME}" \
            --key-condition-expression "incidentId = :id" \
            --expression-attribute-values '{":id": {"S": "'"${INCIDENT_ID}"'"}}' \
            --output json 2>&1) || true

          COUNT=$(echo "$ITEM" | python -c "import sys,json; print(json.load(sys.stdin).get('Count',0))" 2>/dev/null || echo "0")

          if [ "$COUNT" -gt 0 ]; then
            echo "PASS: DynamoDB record found"
            echo "$ITEM" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data.get('Items', []):
              print(f\"  incidentId: {item.get('incidentId', {}).get('S', 'N/A')}\")
              print(f\"  timestamp:  {item.get('timestamp', {}).get('S', 'N/A')}\")
              print(f\"  alarmName:  {item.get('alarmName', {}).get('S', 'N/A')}\")
          " 2>/dev/null || true
            echo "dynamodb_verified=true" >> "$GITHUB_OUTPUT"
          else
            echo "WARNING: No DynamoDB record found"
            echo "dynamodb_verified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Lambda Invocations
        run: |
          echo "Checking CloudWatch Logs for Lambda invocations..."
          PASS_COUNT=0
          for func in metrics-collector logs-collector deploy-context-collector \
                      correlation-engine llm-analyzer notification-service; do
            LOG_GROUP="/aws/lambda/${{ env.EPHEMERAL_PREFIX }}-${func}"
            STREAM=$(aws logs describe-log-streams \
              --log-group-name "${LOG_GROUP}" \
              --order-by LastEventTime --descending --limit 1 \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null) || STREAM="NONE"
            if [ "$STREAM" != "NONE" ] && [ "$STREAM" != "None" ] && [ -n "$STREAM" ]; then
              echo "  PASS: ${func} was invoked"
              PASS_COUNT=$((PASS_COUNT + 1))
            else
              echo "  SKIP: ${func} - no log streams"
            fi
          done
          echo "Lambda invocations: ${PASS_COUNT}/6 confirmed"

      # ================================================================
      # TEST REPORT & CLEANUP
      # ================================================================
      - name: Generate Test Report
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "       EPHEMERAL E2E TEST REPORT"
          echo "============================================"
          echo "  Run ID:            ${{ github.run_id }}"
          echo "  Project Name:      ${{ env.EPHEMERAL_PREFIX }}"
          echo "  Region:            ${{ env.AWS_REGION }}"
          echo "  CLI Lambda Test:   ${{ steps.cli-test.outputs.cli_test }}"
          echo "  Step Functions:    ${{ steps.sfn-exec.outputs.status }}"
          echo "  DynamoDB:          ${{ steps.verify-dynamodb.outputs.dynamodb_verified }}"
          echo "============================================"

      - name: Terraform Destroy (Cleanup)
        if: always()
        working-directory: terraform
        run: |
          echo "Destroying ephemeral infrastructure..."
          terraform init -reconfigure \
            -backend-config="key=ephemeral-tests/run-${{ github.run_id }}/terraform.tfstate" \
            2>/dev/null || true

          terraform destroy -auto-approve \
            -var="environment=dev" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.EPHEMERAL_PREFIX }}" \
            -var="dynamodb_table_name=${{ env.EPHEMERAL_PREFIX }}-store" \
            -var='email_notification_endpoints=["${{ secrets.NOTIFICATION_EMAIL }}"]' \
            -var="create_cloudwatch_alarms=false" \
            || echo "WARNING: Terraform destroy may have partially failed."

      - name: Cleanup Ephemeral State File
        if: always()
        run: |
          aws s3 rm "s3://ericchiu-terraform-state/ephemeral-tests/run-${{ github.run_id }}/" \
            --recursive 2>/dev/null || true
          echo "State file cleanup complete."

      - name: Final Status
        if: always()
        run: |
          STATUS="${{ steps.sfn-exec.outputs.status }}"
          DYNAMO="${{ steps.verify-dynamodb.outputs.dynamodb_verified }}"
          if [ "${STATUS}" = "SUCCEEDED" ] && [ "${DYNAMO}" = "true" ]; then
            echo "E2E TEST PASSED"
            exit 0
          elif [ "${STATUS}" = "SUCCEEDED" ]; then
            echo "E2E TEST PARTIAL PASS"
            exit 0
          else
            echo "E2E TEST COMPLETED WITH WARNINGS - Status: ${STATUS}"
            exit 0
          fi
